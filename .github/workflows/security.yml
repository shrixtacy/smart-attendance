name: Security Scan

on:
  push:
    branches: [ "main" ]
  schedule:
    - cron: '0 0 * * 0' # Weekly on Sunday

jobs:
  python-security:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4
      
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          
      - name: Install bandit
        run: pip install bandit
        
      - name: Run bandit
        # Exclude tests/venv directories
        run: bandit -r server/ -x server/backend-api/tests,server/ml-service/tests,server/backend-api/.venv

  frontend-security:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4
      
      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: frontend/package-lock.json
          
      - name: Install dependencies
        working-directory: frontend
        run: npm ci
        
      - name: Run npm audit
        working-directory: frontend
        run: npm audit --audit-level=high

  secrets-scan:
    runs-on: ubuntu-latest
    name: Gitleaks
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - uses: gitleaks/gitleaks-action@v2
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
